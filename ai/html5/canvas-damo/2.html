<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5炫酷新特性Canvas画布</title>
</head>
<body>
    <canvas id="myCanvas" width="600" height="400" style="border :1pxsolid #333"></canvas>
    <script>
        //画布元素
        const canvas=document.querySelector('#myCanvas');
        //绘制的上下文对象
        const ctx=canvas.getContext('2d');
        ctx.fillStyle='#4299e1'//填充颜色
        ctx.fillRect(20,20,100,80);
        ctx.strokeStyle='#f56565';//边界颜色
        ctx.linWidth=4;
        ctx.strokeRect(150,20,100,80);
        ctx.clearRect(50,50,40,30);

    </script>
</body>
</html>
